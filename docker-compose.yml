services:
  # Service for initializing and updating the Python virtual environment cache
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    # Run as the current host user to avoid file permission issues
    # on mounted volumes.
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    volumes:
      # Mount the project root to access requirements files
      - ./:/app
      # Mount the venv directory to be populated
      - ./p_venv:/app/p_venv:rw
    # Command to run to setup the environment
    command:
      - sh
      - -c
      - >-
        pip-compile --cache-dir /app/.pip-cache -o requirements.txt
        requirements.in && python -m venv --copies /app/p_venv
        && cp /usr/local/lib/libpython3.11.so.1.0 /app/p_venv/lib/
        && cp /usr/lib/x86_64-linux-gnu/libssl.so.3 /app/p_venv/lib/
        && cp /usr/lib/x86_64-linux-gnu/libcrypto.so.3 /app/p_venv/lib/
        && find /usr/local/lib/python3.11 -mindepth 1 -maxdepth 1 ! -name site-packages -exec cp -a {} /app/p_venv/lib/python3.11/ \;
        && mv /app/p_venv/bin/python /app/p_venv/bin/python-real
        && printf '%s\n' '#!/bin/sh' 'VENV_DIR="$$(CDPATH= cd -- "$$(dirname -- "$$0")/.." && pwd)"' 'export PYTHONHOME="$$VENV_DIR"' 'export LD_LIBRARY_PATH="$$VENV_DIR/lib:$${LD_LIBRARY_PATH:-}"' 'exec "$$VENV_DIR/bin/python-real" "$$@"' > /app/p_venv/bin/python
        && chmod +x /app/p_venv/bin/python
        && ln -sf python /app/p_venv/bin/python3
        && ln -sf python /app/p_venv/bin/python3.11
        && /app/p_venv/bin/pip install --upgrade pip
        && /app/p_venv/bin/pip install --no-cache-dir -r requirements.txt

  # Main service for running build, validation, and release tasks
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    # Run as the current host user to avoid file permission issues
    # on mounted volumes.
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    volumes:
      # Mount the populated venv directory as a read-only cache
      - ./p_venv:/app/p_venv:ro
      # Mount the project root to access schemas and write to source
      - ./:/app:rw
      # Mount the host's Vault token file for scripts to use
      - "${XDG_RUNTIME_DIR}/vault/sign-token:/var/run/secrets/vault-token:ro"
      # Mount the host's Vault server CA certificate for TLS verification
      - "${XDG_RUNTIME_DIR}/vault/server.crt:/var/run/secrets/vault-ca.crt:ro"
    # Allows the container to reach the host machine (for Vault)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pass through environment variables for the release process
    environment:
      - PATH=/app/p_venv/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - PYTHONPATH=/app
      - USER=${LOCAL_USER:-cic}
      - LOGNAME=${LOCAL_USER:-cic}
      - HOME=/tmp
      - TORCHINDUCTOR_CACHE_DIR=/tmp/torchinductor
      - VAULT_ADDR=https://host.docker.internal:18200
      - CIC_VAULT_TOKEN_FILE=/var/run/secrets/vault-token
      - CIC_VAULT_CA_FILE=/var/run/secrets/vault-ca.crt
    # Keep the container running in the background
    command: ["tail", "-f", "/dev/null"]
